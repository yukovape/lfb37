<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Yuko Vape — Commander</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00e676;
      --green2: #00c853;
      --green-dim: rgba(0,230,118,0.12);
      --green-border: rgba(0,230,118,0.3);
      --bg: #0a0a0a;
      --card: #111;
      --card2: #181818;
      --text: #f0f0f0;
      --muted: #666;
      --red: #ff4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
    body { padding-bottom: 90px; }

    /* HEADER */
    .header {
      background: #0d0d0d;
      border-bottom: 1px solid rgba(0,230,118,0.15);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 3px;
      background: linear-gradient(135deg, #00e676, #c9a84c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-badge {
      background: var(--green-dim); border: 1px solid var(--green-border);
      color: var(--green); font-size: 0.6rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
    }
    .cart-btn {
      background: var(--green-dim); border: 1px solid var(--green-border);
      color: var(--green); padding: 8px 14px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px;
    }
    .cart-badge {
      background: var(--green); color: #000;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 0.65rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: #0d0d0d;
      border-top: 1px solid rgba(0,230,118,0.15);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 0; gap: 4px; cursor: pointer;
      color: var(--muted); font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: color 0.2s; border: none; background: none;
    }
    .nav-btn .nav-icon { font-size: 1.3rem; }
    .nav-btn.active { color: var(--green); }
    .nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(0,230,118,0.6)); }

    /* VIEWS */
    .view { display: none; padding: 12px; }
    .view.active { display: block; }

    /* PRODUCT CARD */
    .product-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      margin-bottom: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .product-card:hover { border-color: var(--green-border); }
    .product-img-wrap { position: relative; }
    .product-img-wrap img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .product-img-placeholder {
      width: 100%; height: 180px; background: var(--card2);
      display: flex; align-items: center; justify-content: center; font-size: 4rem;
    }
    .product-qty-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 0.75rem; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 4px;
    }
    .product-body { padding: 14px; }
    .product-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 2px; color: #fff;
      margin-bottom: 2px;
    }
    .product-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; }

    /* TIERS */
    .tiers { display: flex; gap: 8px; margin-bottom: 14px; }
    .tier-btn {
      flex: 1; background: var(--card2);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 10px 6px; text-align: center;
      cursor: pointer; transition: all 0.15s;
    }
    .tier-btn.selected {
      border-color: var(--green);
      background: var(--green-dim);
      box-shadow: 0 0 12px rgba(0,230,118,0.15);
    }
    .tier-qty { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
    .tier-price { font-size: 1rem; font-weight: 800; color: var(--green); }
    .tier-btn.selected .tier-qty { color: rgba(0,230,118,0.7); }

    /* FLAVOR */
    .flavor-label {
      font-size: 0.68rem; color: var(--muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
    }
    .flavor-select {
      width: 100%; background: var(--card2);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); padding: 11px 14px;
      border-radius: 10px; font-size: 0.9rem; margin-bottom: 14px;
      outline: none; font-family: 'Inter', sans-serif;
    }
    .flavor-select:focus { border-color: var(--green-border); }

    /* QTY */
    .qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .qty-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; flex: 1; }
    .qty-controls { display: flex; align-items: center; gap: 12px; }
    .qty-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--card2); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .qty-btn:active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .qty-val { font-size: 1.1rem; font-weight: 800; min-width: 32px; text-align: center; }

    /* ADD BTN */
    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, #00e676, #00c853);
      color: #000; border: none; border-radius: 10px;
      padding: 14px; font-size: 0.95rem; font-weight: 800;
      cursor: pointer; letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(0,230,118,0.25);
    }
    .add-btn:active { transform: scale(0.98); opacity: 0.9; }
    .add-btn:disabled { background: #222; color: var(--muted); cursor: not-allowed; box-shadow: none; }

    /* CART */
    .cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .cart-empty .icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.4; }
    .cart-item {
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .cart-item-name { font-weight: 700; font-size: 0.92rem; }
    .cart-item-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .cart-item-price { font-weight: 800; color: var(--green); font-size: 0.92rem; white-space: nowrap; }
    .cart-remove { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 4px; }
    .cart-total {
      background: var(--green-dim); border: 1px solid var(--green-border);
      border-radius: 12px; padding: 16px; margin: 14px 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .cart-total-label { font-size: 0.78rem; color: rgba(0,230,118,0.7); text-transform: uppercase; letter-spacing: 1px; }
    .cart-total-pcs { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .cart-total-amount { font-size: 1.6rem; font-weight: 800; color: var(--green); }
    .min-warning {
      background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3);
      color: #ff6666; border-radius: 10px; padding: 10px 14px;
      font-size: 0.82rem; margin-bottom: 12px; font-weight: 600;
    }
    .checkout-btn {
      width: 100%;
      background: linear-gradient(135deg, #00e676, #00c853);
      color: #000; border: none; border-radius: 12px;
      padding: 16px; font-size: 1rem; font-weight: 800;
      cursor: pointer; letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(0,230,118,0.3);
    }
    .checkout-btn:disabled { background: #222; color: var(--muted); cursor: not-allowed; box-shadow: none; }

    /* CHECKOUT */
    .form-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 2px; color: var(--muted);
      margin: 20px 0 12px; text-transform: uppercase;
    }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; display: block; font-weight: 600; }
    .form-input {
      width: 100%; background: var(--card2);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); padding: 12px 14px;
      border-radius: 10px; font-size: 0.92rem;
      outline: none; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--green-border); }
    .form-select {
      width: 100%; background: var(--card2);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); padding: 12px 14px;
      border-radius: 10px; font-size: 0.92rem;
      outline: none; font-family: 'Inter', sans-serif;
    }
    .order-summary {
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 16px; margin-bottom: 16px;
    }
    .order-line {
      display: flex; justify-content: space-between;
      font-size: 0.82rem; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .order-line:last-child { border-bottom: none; }
    .order-line span:first-child { color: var(--muted); }
    .order-total-line {
      display: flex; justify-content: space-between;
      font-weight: 800; padding-top: 12px; margin-top: 4px;
      font-size: 1.05rem;
    }
    .order-total-line span:last-child { color: var(--green); }
    .confirm-btn {
      width: 100%;
      background: linear-gradient(135deg, #00e676, #00c853);
      color: #000; border: none; border-radius: 12px;
      padding: 16px; font-size: 1rem; font-weight: 800;
      cursor: pointer; box-shadow: 0 4px 20px rgba(0,230,118,0.3);
    }
    .back-btn {
      width: 100%; background: var(--card2); color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px; font-size: 0.9rem;
      cursor: pointer; margin-bottom: 14px; font-family: 'Inter', sans-serif;
    }

    /* SUCCESS */
    .success-view { text-align: center; padding: 60px 20px; }
    .success-glow {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--green-dim); border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(0,230,118,0.3);
    }
    .success-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--green); margin-bottom: 12px; }
    .success-sub { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }

    /* LOADER */
    .loader { display: flex; justify-content: center; align-items: center; padding: 60px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,230,118,0.15);
      border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: #1a1a1a; border: 1px solid var(--green-border);
      color: var(--green); padding: 10px 20px; border-radius: 20px;
      font-size: 0.82rem; font-weight: 700; z-index: 999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .toast.show { opacity: 1; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,230,118,0.2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo-text">YUKO VAPE</div>
    <div class="header-badge">B2B</div>
  </div>
  <button class="cart-btn" onclick="showView('cart')">
    🛒 <span id="cartBadge" class="cart-badge">0</span>
  </button>
</div>

<!-- VIEWS -->
<div class="view active" id="view-catalogue">
  <div class="loader"><div class="spinner"></div></div>
</div>

<div class="view" id="view-cart"></div>
<div class="view" id="view-checkout"></div>

<div class="view" id="view-success">
  <div class="success-view">
    <div class="success-glow">✓</div>
    <div class="success-title">COMMANDE ENVOYÉE</div>
    <p class="success-sub">Votre commande a bien été transmise.<br/>Notre équipe vous contacte très rapidement.</p>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-catalogue" onclick="showView('catalogue')">
    <span class="nav-icon">🏠</span>Accueil
  </button>
  <button class="nav-btn" id="nav-cart" onclick="showView('cart')">
    <span class="nav-icon">🛒</span>Panier
  </button>
  <button class="nav-btn" id="nav-contact" onclick="openContact()">
    <span class="nav-icon">✉️</span>Contact
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let products = [], cart = [], productStates = {};
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  async function init() {
    await loadProducts();
  }

  async function loadProducts() {
    try {
      const res = await fetch(`${API}/api/products`);
      products = await res.json();
      products.forEach(p => {
        productStates[p.id] = {
          selectedTier: p.tiers?.[0] || null,
          flavor: p.flavors?.[0] || '',
          qty: p.tiers?.[0]?.qty || 30
        };
      });
      renderCatalogue();
    } catch(e) {
      document.getElementById('view-catalogue').innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted)">Impossible de charger les produits.</p>';
    }
  }

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    const navBtn = document.getElementById('nav-' + name);
    if (navBtn) navBtn.classList.add('active');
    if (name === 'cart') renderCart();
    if (name === 'checkout') renderCheckout();
  }

  function openContact() {
    window.open('https://t.me/yukovape', '_blank');
  }

  function renderCatalogue() {
    const el = document.getElementById('view-catalogue');
    if (!products.length) {
      el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:3rem;margin-bottom:16px">📦</div><p>Aucun produit disponible</p></div>';
      return;
    }
    el.innerHTML = products.map(p => renderProductCard(p)).join('');
  }

  function renderProductCard(p) {
    const state = productStates[p.id];
    const tiers = p.tiers || [];
    const flavors = p.flavors || [];

    const tiersHTML = tiers.map((t, i) => `
      <div class="tier-btn ${state.selectedTier?.qty === t.qty ? 'selected' : ''}" onclick="selectTier('${p.id}', ${i})">
        <div class="tier-qty">${t.label}</div>
        <div class="tier-price">${t.price.toFixed(2)}€</div>
      </div>`).join('');

    const flavorsHTML = flavors.length ? `
      <div class="flavor-label">Parfum</div>
      <select class="flavor-select" onchange="selectFlavor('${p.id}', this.value)">
        ${flavors.map(f => `<option value="${f}" ${state.flavor===f?'selected':''}>${f}</option>`).join('')}
      </select>` : '';

    const imgHTML = p.image_url
      ? `<div class="product-img-wrap"><img src="${p.image_url}" onerror="this.parentElement.innerHTML='<div class=product-img-placeholder>📦</div>'"><div class="product-qty-badge">🏷 ${p.name}</div></div>`
      : `<div class="product-img-placeholder">📦</div>`;

    return `
      <div class="product-card" id="pcard-${p.id}">
        ${imgHTML}
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
          <div class="tiers">${tiersHTML}</div>
          ${flavorsHTML}
          <div class="qty-row">
            <div class="qty-label">Quantité</div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty('${p.id}', -10)">−</button>
              <div class="qty-val" id="qty-${p.id}">${state.qty}</div>
              <button class="qty-btn" onclick="changeQty('${p.id}', 10)">+</button>
            </div>
          </div>
          <button class="add-btn" onclick="addToCart('${p.id}')">+ Ajouter au panier</button>
        </div>
      </div>`;
  }

  function selectTier(productId, tierIndex) {
    const p = products.find(x => x.id === productId);
    if (!p) return;
    productStates[productId].selectedTier = p.tiers[tierIndex];
    productStates[productId].qty = p.tiers[tierIndex].qty;
    document.getElementById('pcard-' + productId).outerHTML = renderProductCard(p);
  }

  function selectFlavor(productId, flavor) { productStates[productId].flavor = flavor; }

  function changeQty(productId, delta) {
    const state = productStates[productId];
    const minQty = state.selectedTier?.qty || 10;
    state.qty = Math.max(minQty, state.qty + delta);
    document.getElementById('qty-' + productId).textContent = state.qty;
    const p = products.find(x => x.id === productId);
    if (p) { let best = p.tiers[0]; for (const t of p.tiers) { if (state.qty >= t.qty) best = t; } state.selectedTier = best; }
  }

  function addToCart(productId) {
    const p = products.find(x => x.id === productId);
    const state = productStates[productId];
    if (!state.selectedTier) return;
    if (!state.flavor && p.flavors?.length) { showToast('⚠️ Choisissez un parfum'); return; }
    let bestTier = p.tiers[0];
    for (const t of p.tiers) { if (state.qty >= t.qty) bestTier = t; }
    const item = { product_id: p.id, product_name: p.name, flavor: state.flavor, qty: state.qty, unit_price: bestTier.price, total: state.qty * bestTier.price };
    const existing = cart.find(c => c.product_id === p.id && c.flavor === state.flavor);
    if (existing) { existing.qty += state.qty; existing.total = existing.qty * bestTier.price; }
    else cart.push(item);
    updateCartBadge();
    showToast(`✅ ${p.name} ajouté !`);
  }

  function updateCartBadge() {
    document.getElementById('cartBadge').textContent = cart.reduce((s,i) => s + i.qty, 0);
  }
  function getCartTotal() { return cart.reduce((s,i) => s + i.total, 0); }
  function getTotalQty() { return cart.reduce((s,i) => s + i.qty, 0); }

  function renderCart() {
    const el = document.getElementById('view-cart');
    if (!cart.length) {
      el.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p style="font-weight:700;margin-bottom:6px">Panier vide</p><p style="font-size:0.8rem">Ajoutez des produits depuis l'accueil</p></div>`;
      return;
    }
    const totalQty = getTotalQty();
    const minOk = totalQty >= 30;
    el.innerHTML = `
      ${cart.map((item, i) => `
        <div class="cart-item">
          <div style="flex:1">
            <div class="cart-item-name">${item.product_name}</div>
            <div class="cart-item-sub">${item.flavor} · ${item.qty} pcs × ${item.unit_price.toFixed(2)}€</div>
          </div>
          <div class="cart-item-price">${item.total.toFixed(2)}€</div>
          <button class="cart-remove" onclick="removeFromCart(${i})">✕</button>
        </div>`).join('')}
      <div class="cart-total">
        <div>
          <div class="cart-total-label">Total estimé</div>
          <div class="cart-total-pcs">${totalQty} pièces</div>
        </div>
        <div class="cart-total-amount">${getCartTotal().toFixed(2)}€</div>
      </div>
      ${!minOk ? `<div class="min-warning">⚠️ Minimum 30 pièces requis (${totalQty}/30)</div>` : ''}
      <button class="checkout-btn" onclick="showView('checkout')" ${!minOk?'disabled':''}>Commander →</button>`;
  }

  function removeFromCart(i) { cart.splice(i,1); updateCartBadge(); renderCart(); }

  function renderCheckout() {
    const el = document.getElementById('view-checkout');
    el.innerHTML = `
      <button class="back-btn" onclick="showView('cart')">← Retour au panier</button>
      <div class="order-summary">
        ${cart.map(item => `
          <div class="order-line">
            <span>${item.product_name} — ${item.flavor}</span>
            <span>${item.qty} pcs</span>
          </div>`).join('')}
        <div class="order-total-line"><span>Total</span><span>${getCartTotal().toFixed(2)}€</span></div>
      </div>
      <div class="form-section-title">Vos informations</div>
      <div class="form-group">
        <label class="form-label">Nom / Société *</label>
        <input class="form-input" id="f-name" placeholder="ex: Jean Dupont" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Telegram ou Email *</label>
        <input class="form-input" id="f-contact" placeholder="@votretelegram ou email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Pays de livraison</label>
        <select class="form-select" id="f-country">
          <option value="France">🇫🇷 France</option>
          <option value="Belgique">🇧🇪 Belgique</option>
          <option value="Suisse">🇨🇭 Suisse</option>
          <option value="Luxembourg">🇱🇺 Luxembourg</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Notes (optionnel)</label>
        <textarea class="form-input" id="f-notes" rows="3" placeholder="Informations complémentaires..."></textarea>
      </div>
      <button class="confirm-btn" onclick="submitOrder()">✅ Confirmer la commande</button>`;
  }

  async function submitOrder() {
    const name = document.getElementById('f-name')?.value?.trim();
    const contact = document.getElementById('f-contact')?.value?.trim();
    const country = document.getElementById('f-country')?.value;
    const notes = document.getElementById('f-notes')?.value?.trim();
    if (!name || !contact) { showToast('⚠️ Remplissez tous les champs'); return; }
    const btn = document.querySelector('.confirm-btn');
    btn.disabled = true; btn.textContent = 'Envoi en cours...';
    try {
      const res = await fetch(`${API}/api/orders`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ customer_name: name, customer_contact: contact, country, items: cart, total: getCartTotal(), notes })
      });
      if (!res.ok) throw new Error();
      cart = []; updateCartBadge();
      showView('success');
      if (tg) setTimeout(() => tg.close(), 3000);
    } catch(e) {
      btn.disabled = false; btn.textContent = '✅ Confirmer la commande';
      showToast('❌ Erreur, réessayez');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
